# Base _quarto.yml template for PDF runs (Phase 12 — D-25, D-27).
# Copied into <run_dir>/output/_quarto.yml at Gate 3 when user selects PDF or Both.
#
# Design intent (Phase 12 — minimal clean PDF):
#   - xelatex engine (Unicode-safe, TinyTeX-provided)
#   - 11pt body font, 1.4 linestretch for readability
#   - 1 inch margins all sides
#   - US Letter paper size
#   - quarto-ext/mermaid filter enabled (installed at Gate 3)
#
# Non-goals (deferred to Phase 19 — PDF Quality):
#   - Custom font families (Inter body, JetBrains Mono code)
#   - Cover page, TOC depth tuning, syntax highlighting theme
#   - fvextra line wrapping, advanced code-block styling

project:
  type: default

format:
  pdf:
    pdf-engine: xelatex
    fontsize: 11pt
    linestretch: 1.4
    geometry:
      - top=1in
      - bottom=1in
      - left=1in
      - right=1in
    papersize: letter
    filters:
      - quarto-ext/mermaid
